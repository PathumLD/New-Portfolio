<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathum Dissanayake | Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'dark-background': '#1c1a1c',
            ink: '#09090b',
            paper: '#f7f7f2',
            primary: {
              50: 'rgb(var(--primary-50-rgb) / <alpha-value>)',
              100: 'rgb(var(--primary-100-rgb) / <alpha-value>)',
              200: 'rgb(var(--primary-200-rgb) / <alpha-value>)',
              300: 'rgb(var(--primary-300-rgb) / <alpha-value>)',
              400: 'rgb(var(--primary-400-rgb) / <alpha-value>)',
              500: 'rgb(var(--primary-500-rgb) / <alpha-value>)',
              600: 'rgb(var(--primary-600-rgb) / <alpha-value>)',
              700: 'rgb(var(--primary-700-rgb) / <alpha-value>)',
              800: 'rgb(var(--primary-800-rgb) / <alpha-value>)',
              900: 'rgb(var(--primary-900-rgb) / <alpha-value>)',
              950: 'rgb(var(--primary-950-rgb) / <alpha-value>)',
            }
          },
          animation: {
            'fade-in-up': 'fade-in-up 0.8s ease-out forwards',
            'pulse-glow': 'pulse-glow 4s ease-in-out infinite',
            'slow-pan': 'slow-pan 24s ease-in-out infinite alternate',
            'marquee': 'marquee 28s linear infinite',
            'sheen': 'sheen 4.8s ease-in-out infinite',
            'float-panel': 'float-panel 8s ease-in-out infinite',
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --mouse-x: 50%;
      --mouse-y: 50%;

      /* Light theme (Green - #019d5c) */
      --primary-50-rgb: 236 254 247;
      --primary-100-rgb: 209 250 234;
      --primary-200-rgb: 165 243 210;
      --primary-300-rgb: 110 231 183;
      --primary-400-rgb: 52 211 153;
      --primary-500-rgb: 0 203 118;
      --primary-600-rgb: 0 166 97;
      --primary-700-rgb: 0 133 78;
      --primary-800-rgb: 1 105 63;
      --primary-900-rgb: 2 86 53;
      --primary-950-rgb: 0 49 30;
      --primary-500-hex: #00cb76;
      --grid-line: rgba(24, 24, 27, 0.08);
    }

    html.dark {
      /* Dark theme (Bright Green - #00cb76) */
      --primary-50-rgb: 236 254 247;
      --primary-100-rgb: 209 250 234;
      --primary-200-rgb: 165 243 210;
      --primary-300-rgb: 110 231 183;
      --primary-400-rgb: 52 211 153;
      --primary-500-rgb: 0 203 118;
      --primary-600-rgb: 0 166 97;
      --primary-700-rgb: 0 133 78;
      --primary-800-rgb: 1 105 63;
      --primary-900-rgb: 2 86 53;
      --primary-950-rgb: 0 49 30;
      --primary-500-hex: #00cb76;
      --grid-line: rgba(255, 255, 255, 0.08);
    }

    body {
      min-width: 320px;
      background: #f7f7f2;
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    }

    html.dark body {
      background: #09090b;
    }

    @keyframes slow-pan {
      0% {
        transform: translate3d(-1.5%, -1%, 0) scale(1);
      }

      100% {
        transform: translate3d(1.5%, 1%, 0) scale(1.03);
      }
    }

    @keyframes fade-in-up {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    @keyframes sheen {
      0%,
      12% {
        transform: translateX(-120%) skewX(-18deg);
        opacity: 0;
      }

      28% {
        opacity: 0.42;
      }

      48%,
      100% {
        transform: translateX(140%) skewX(-18deg);
        opacity: 0;
      }
    }

    @keyframes float-panel {
      0%,
      100% {
        transform: translate3d(0, 0, 0);
      }

      50% {
        transform: translate3d(0, -10px, 0);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(var(--primary-500-rgb), 0.4);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 20px 10px rgba(var(--primary-500-rgb), 0);
      }
    }

    ::selection {
      background-color: var(--primary-500-hex);
      color: white;
    }

    .animated-element {
      opacity: 0;
    }

    .animate-fade-in-up {
      animation-fill-mode: forwards;
    }

    .site-backdrop {
      background:
        radial-gradient(circle at 8% 6%, rgba(16, 185, 129, 0.14), transparent 28rem),
        radial-gradient(circle at 88% 10%, rgba(6, 182, 212, 0.11), transparent 24rem),
        radial-gradient(circle at 58% 88%, rgba(245, 158, 11, 0.09), transparent 26rem),
        linear-gradient(180deg, rgba(250, 250, 247, 0.96), rgba(244, 244, 239, 1));
    }

    html.dark .site-backdrop {
      background:
        radial-gradient(circle at 8% 6%, rgba(16, 185, 129, 0.18), transparent 28rem),
        radial-gradient(circle at 88% 10%, rgba(6, 182, 212, 0.12), transparent 24rem),
        radial-gradient(circle at 58% 88%, rgba(245, 158, 11, 0.08), transparent 26rem),
        linear-gradient(180deg, rgba(9, 9, 11, 1), rgba(13, 13, 16, 1));
    }

    .grid-overlay {
      background-image:
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, black 0%, transparent 78%);
    }

    .ambient-beam {
      background:
        linear-gradient(115deg, transparent 0%, rgba(16, 185, 129, 0.12) 28%, transparent 56%),
        linear-gradient(70deg, transparent 8%, rgba(6, 182, 212, 0.08) 42%, transparent 72%);
      filter: blur(24px);
      transform-origin: center;
      animation: slow-pan 22s ease-in-out infinite alternate;
    }

    .premium-surface {
      position: relative;
      isolation: isolate;
      transform-style: preserve-3d;
      will-change: transform, opacity;
    }

    .premium-surface::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(120deg, rgba(16, 185, 129, 0.16), transparent 34%),
        linear-gradient(300deg, rgba(6, 182, 212, 0.12), transparent 38%);
      opacity: 0;
      transition: opacity 420ms ease;
    }

    .premium-surface::after {
      content: "";
      position: absolute;
      inset: -45% auto -45% -35%;
      width: 42%;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      opacity: 0;
      transform: translateX(-120%) skewX(-18deg);
    }

    .premium-surface:hover::before {
      opacity: 1;
    }

    .premium-surface:hover::after {
      animation: sheen 1.25s ease-out;
    }

    .magnetic-link {
      position: relative;
      overflow: hidden;
    }

    .magnetic-link::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: translateX(-120%) skewX(-18deg);
      transition: transform 620ms ease;
    }

    .magnetic-link:hover::before {
      transform: translateX(130%) skewX(-18deg);
    }

    .text-sheen {
      background-image: linear-gradient(100deg, currentColor 0%, currentColor 38%, rgba(16, 185, 129, 0.9) 48%, currentColor 58%, currentColor 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fade-in-up 0.8s ease-out forwards, text-sheen 8s ease-in-out infinite;
    }

    @keyframes text-sheen {
      0%,
      38%,
      100% {
        background-position: 120% 50%;
      }

      54% {
        background-position: 0% 50%;
      }
    }

    .marquee-mask {
      mask-image: linear-gradient(90deg, transparent, black 12%, black 88%, transparent);
    }

    .motion-frame {
      animation: float-panel 8s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

    [style*="--stagger"] {
      animation-delay: calc(var(--stagger) * 100ms);
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }
  </style>

{

</script>
</head>
